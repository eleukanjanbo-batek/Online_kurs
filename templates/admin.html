<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="sidebar">
        <h2 style="color: var(--primary); margin-bottom: 40px;">IT Academy</h2>
        <a href="/admin" class="nav-link active"><i class="fas fa-layer-group"></i> Kurslar</a>
        <a href="/admin/arizalar" class="nav-link"><i class="fas fa-user-friends"></i> Arizalar</a>
        <a href="/admin/profile" class="nav-link"><i class="fas fa-user-circle"></i> Profil</a>
        <a href="/logout" class="nav-link" style="margin-top: auto; color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Shigiw</a>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 35px;">Kurslardı basqarıw</h1>
        <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
            <div class="card">
                <h3>+ Jańa kurs qosıw</h3>
                <form action="/admin/add_course" method="POST" style="margin-top: 20px;">
                    <input type="text" name="title" placeholder="Kurs ati" class="form-input" required>
                    <textarea name="description" placeholder="Tariyp" class="form-input" rows="4"></textarea>
                    <input type="text" name="price" placeholder="Baxasi (somda)" class="form-input">
                    <button type="submit" class="btn">Saytǵa shıǵarıw</button>
                </form>
            </div>
            <div>
                {% for course in courses %}
                <div class="card" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 15px 25px;">
                    <div>
                        <h4 style="color: var(--primary);">{{ course.title }}</h4>
                        <small>{{ course.applications|length }} arza túsgen</small>
                    </div>
                    <a href="/delete_course/{{ course.id }}" style="color: #ef4444;"><i class="fas fa-trash"></i></a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
