<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kursga yozilganlar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 1100px;
            margin: auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .admin-header {
            background: #1e293b;
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f1f5f9;
            color: #475569;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            color: #1e293b;
        }

        .done-row {
            background-color: #f0fdf4 !important;
            opacity: 0.6;
        }

        .done-row td {
            text-decoration: line-through;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-del {
            color: #ef4444;
            border: 1px solid #fee2e2;
            padding: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn-del:hover {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <div class="admin-header">
            <h2><i class="fas fa-users-cog"></i> Arizalar Basqariwi</h2>
            <a href="/" style="color: white; text-decoration: none; font-size: 14px;"><i class="fas fa-eye"></i> Saytti
                koriw</a>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Status</th>
                    <th>Ati-familiya</th>
                    <th>Telefon</th>
                    <th>Tanlangan Kurs</th>
                    <th>Ameller</th>
                </tr>
            </thead>
            <tbody>
                {% for app in apps %}
                <tr id="row-{{ app.id }}">
                    <td>
                        <input type="checkbox" class="check-box" id="check-{{ app.id }}"
                            onclick="checkCall('{{ app.id }}')">
                    </td>
                    <td><strong>{{ app.name }}</strong></td>
                    <td><a href="tel:{{ app.phone }}" style="text-decoration: none; color: #3498db;">{{ app.phone }}</a>
                    </td>
                    <td><span class="status-badge" style="background: #e0f2fe; color: #0369a1;">{{ app.course_title
                            }}</span></td>
                    <td>
                        <a href="{{ url_for('delete_application', id=app.id) }}" class="btn-del"
                            onclick="return confirm('O\'chirilsinmi?')">
                            <i class="fas fa-trash-alt"></i>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>

</html>
