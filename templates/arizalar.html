<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Arzalar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="sidebar">
        <h2 style="color: var(--primary); margin-bottom: 40px;">IT Academy</h2>
        <a href="/admin" class="nav-link"><i class="fas fa-layer-group"></i> Kurslar</a>
        <a href="/admin/arizalar" class="nav-link active"><i class="fas fa-user-friends"></i> Arzalar</a>
        <a href="/admin/profile" class="nav-link"><i class="fas fa-user-circle"></i> Profil</a>
        <a href="/logout" class="nav-link" style="margin-top: auto; color: #ef4444;"><i class="fas fa-sign-out-alt"></i> Shigiw</a>
    </div>

    <div class="main-content">
        <h1 style="margin-bottom: 35px;">Kelip tusgen arzalar</h1>
        <div class="grid-container">
            {% for course in courses %}
            <div class="card">
                <h3 style="border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; color: var(--primary);">{{ course.title }}</h3>
                {% for app in course.applications %}
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f8fafc;">
                    <div>
                        <strong>{{ app.name }}</strong><br>
                        <small>{{ app.phone }}</small>
                    </div>
                    <a href="/delete_app/{{ app.id }}" style="color: #fda4af;"><i class="fas fa-trash-alt"></i></a>
                </div>
                {% endfor %}
                {% if not course.applications %}<p style="color: #cbd5e1; text-align: center;">Ele arzalar joq</p>{% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
