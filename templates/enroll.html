<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Jazılıw | {{ course.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div class="card" style="max-width: 450px; width: 100%;">
        <h2 style="text-align: center; margin-bottom: 10px;">{{ course.title }}</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 30px;">Kursqa jazılıw ushın maǵlıwmatlardı toldırıń</p>
        
        <form action="/submit" method="POST">
            <input type="hidden" name="course_id" value="{{ course.id }}">
            <input type="text" name="name" class="form-input" placeholder="Atińiz" required>
            <input type="tel" name="phone" class="form-input" placeholder="Telefon (Maselen: +998 90...)" required>
            <button type="submit" class="btn">Jiberiw</button>
        </form>
        <a href="/" style="display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--text-muted);">← Artqa qaytıw</a>
    </div>
</body>
</html>
